server.port: ${PORT:8080}

spring:
  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:src/main/resources/static/
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
